name: Zero-Trust Agent Security Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install CLI Dependencies
      run: |
        cd cli
        npm ci

    - name: Run Red-Team Security Tests
      run: |
        cd cli
        npm test
